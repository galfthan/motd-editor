<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTD Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Noto Sans Symbols 2 has Unicode 13.0 block characters -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav class="menu-bar">
            <div class="menu-bar-left">
                <div class="menu-item" data-menu="file">
                    <button class="menu-trigger">File</button>
                    <div class="menu-dropdown">
                        <button data-action="new">New</button>
                        <button data-action="open">Open...</button>
                        <hr>
                        <button data-action="save"><span class="menu-label">Save</span><span class="menu-shortcut">Ctrl+S</span></button>
                        <button data-action="save-as"><span class="menu-label">Save As...</span><span class="menu-shortcut">Ctrl+Shift+S</span></button>
                        <hr>
                        <button data-action="import-png">Import PNG...</button>
                    </div>
                </div>
                <div class="menu-item" data-menu="canvas">
                    <button class="menu-trigger">Canvas</button>
                    <div class="menu-dropdown">
                        <button data-action="resize">Resize...</button>
                        <button data-action="clear">Clear</button>
                    </div>
                </div>
            </div>
            <div class="menu-bar-right">
                <span id="status">Sextant Mode | 40×20 chars</span>
            </div>
        </nav>

        <div class="toolbar-strip">
            <div class="toolbar-tools">
                <button id="tool-draw" class="tool-btn active" title="Draw (D)">
                    <span class="icon">✏️</span> Draw
                </button>
                <button id="tool-erase" class="tool-btn" title="Erase (E)">
                    <span class="icon">🧹</span> Erase
                </button>
                <button id="tool-char" class="tool-btn" title="Symbol (C)">
                    <span class="icon">🔣</span> Symbol
                </button>
                <button id="tool-text" class="tool-btn" title="Text (T)">
                    <span class="icon">T</span> Text
                </button>
                <button id="tool-box" class="tool-btn" title="Box (B)">
                    <span class="icon">▭</span> Box
                </button>
                <button id="tool-line" class="tool-btn" title="Line (L)">
                    <span class="icon">╱</span> Line
                </button>
                <button id="tool-select" class="tool-btn" title="Select (S)">
                    <span class="icon">⬚</span> Select
                </button>
                <button id="tool-select-subpixel" class="tool-btn" title="Select Subpixels (Shift+S)">
                    <span class="icon">⠿</span> Subpix
                </button>
                <button id="tool-pick" class="tool-btn" title="Pick Color (P)">
                    <span class="icon">💧</span> Pick
                </button>
            </div>
        </div>

        <main>
            <aside id="context-panel" class="context-panel">
                <section id="color-section">
                    <h3>Colors</h3>
                    <div class="sidebar-colors">
                        <div class="color-row" id="fg-color-row">
                            <label>FG:</label>
                            <input type="color" id="fg-color" value="#ffffff">
                            <label class="checkbox-label">
                                <input type="checkbox" id="fg-default" checked> Def
                            </label>
                        </div>
                        <div class="color-row" id="bg-color-row">
                            <label>BG:</label>
                            <input type="color" id="bg-color" value="#000000">
                            <label class="checkbox-label">
                                <input type="checkbox" id="bg-default" checked> Def
                            </label>
                        </div>
                    </div>
                </section>
                <section id="box-style-section" style="display:none">
                    <h3>Line Style</h3>
                    <div class="box-style-buttons">
                        <button class="box-style-btn active" data-style="1">┌─┐ Light</button>
                        <button class="box-style-btn" data-style="2">┏━┓ Heavy</button>
                        <button class="box-style-btn" data-style="3">╔═╗ Double</button>
                    </div>
                </section>
                <section id="render-section">
                    <h3>Rendering</h3>
                    <div class="render-toggle">
                        <button class="render-mode-btn" data-mode="bitmap">Bitmap</button>
                        <button class="render-mode-btn active" data-mode="font">Font</button>
                    </div>
                </section>
                <section class="char-palette" id="char-palette-section" style="display:none">
                    <h3>Symbols</h3>
                    <div class="char-tabs">
                        <button class="tab-btn active" data-tab="diagonal">Diagonal</button>
                        <button class="tab-btn" data-tab="triangle">Triangle</button>
                        <button class="tab-btn" data-tab="blocks">Blocks</button>
                        <button class="tab-btn" data-tab="shades">Shades</button>
                        <button class="tab-btn" data-tab="lines">Lines</button>
                        <button class="tab-btn" data-tab="misc">Misc</button>
                    </div>
                    <div id="char-palette" class="char-grid"></div>
                </section>
            </aside>
            <div class="editor-area">
                <div class="canvas-container">
                    <div id="canvas" class="canvas"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="file-input" accept=".txt" style="display:none">
    <input type="file" id="png-input" accept="image/*" style="display:none">

    <!-- Save As Dialog -->
    <dialog id="save-as-dialog">
        <h3>Save As</h3>
        <form id="save-as-form">
            <div class="form-row">
                <label for="save-filename">Filename:</label>
                <input type="text" id="save-filename" value="motd.txt">
            </div>
            <div class="form-row">
                <label>Format:</label>
                <div class="radio-group">
                    <label><input type="radio" name="save-format" value="ansi" checked> ANSI</label>
                    <label><input type="radio" name="save-format" value="plain"> Plain</label>
                </div>
            </div>
            <div class="dialog-buttons">
                <button type="button" id="save-as-cancel">Cancel</button>
                <button type="submit">Save</button>
            </div>
        </form>
    </dialog>

    <!-- Resize Dialog -->
    <dialog id="resize-dialog">
        <h3>Resize Canvas</h3>
        <form id="resize-form">
            <div class="form-row">
                <label>Width (chars):</label>
                <input type="number" id="resize-width" value="40" min="1" max="500">
            </div>
            <div class="form-row">
                <label>Height (chars):</label>
                <input type="number" id="resize-height" value="20" min="1" max="200">
            </div>
            <div class="dialog-buttons">
                <button type="button" id="resize-cancel">Cancel</button>
                <button type="submit">Resize</button>
            </div>
        </form>
    </dialog>

    <!-- PNG Import Dialog -->
    <dialog id="png-dialog">
        <h3>Import PNG</h3>
        <form id="png-form">
            <div class="form-row">
                <label>Width (chars):</label>
                <input type="number" id="png-width" value="80" min="1" max="500">
            </div>
            <div class="form-row">
                <label>Threshold:</label>
                <input type="range" id="png-threshold" value="250" min="0" max="255">
                <span id="png-threshold-value">250</span>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-invert"> Invert
                </label>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-color"> Use Colors
                </label>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-bitmap"> Bitmap Matching
                </label>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-extended"> Extended Chars (diagonals/triangles)
                </label>
            </div>
            <div class="dialog-buttons">
                <button type="button" id="png-cancel">Cancel</button>
                <button type="submit">Import</button>
            </div>
        </form>
    </dialog>

    <script src="js/api.js"></script>
    <script src="js/glyphCache.js"></script>
    <script src="js/boxdraw.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/toolbar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

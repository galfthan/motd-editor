<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode ASCII Art Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Noto Sans Symbols 2 has Unicode 13.0 block characters -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <h1>Unicode ASCII Art Editor</h1>
            <div class="header-controls">
                <span id="status">Sextant Mode | 40×20 chars</span>
            </div>
        </header>

        <main>
            <aside class="toolbar">
                <section class="tool-section">
                    <h3>Tools</h3>
                    <div class="tool-buttons">
                        <button id="tool-draw" class="tool-btn active" title="Draw (D)">
                            <span class="icon">✏️</span> Draw
                        </button>
                        <button id="tool-erase" class="tool-btn" title="Erase (E)">
                            <span class="icon">🧹</span> Erase
                        </button>
                        <button id="tool-char" class="tool-btn" title="Character (C)">
                            <span class="icon">🔣</span> Char
                        </button>
                        <button id="tool-text" class="tool-btn" title="Text (T)">
                            <span class="icon">T</span> Text
                        </button>
                        <button id="tool-box" class="tool-btn" title="Box (B)">
                            <span class="icon">▭</span> Box
                        </button>
                        <button id="tool-line" class="tool-btn" title="Line (L)">
                            <span class="icon">╱</span> Line
                        </button>
                        <button id="tool-select" class="tool-btn" title="Select (S)">
                            <span class="icon">⬚</span> Select
                        </button>
                        <button id="tool-select-subpixel" class="tool-btn" title="Select Subpixels (Shift+S)">
                            <span class="icon">⠿</span> Subpixels
                        </button>
                        <button id="tool-pick" class="tool-btn" title="Pick Color (P)">
                            <span class="icon">💧</span> Pick
                        </button>
                    </div>
                </section>

                <section class="tool-section">
                    <h3>Colors</h3>
                    <div class="color-picker">
                        <div class="color-row">
                            <label>FG:</label>
                            <input type="color" id="fg-color" value="#ffffff">
                            <label class="checkbox-label">
                                <input type="checkbox" id="fg-default" checked> Default
                            </label>
                        </div>
                        <div class="color-row">
                            <label>BG:</label>
                            <input type="color" id="bg-color" value="#000000">
                            <label class="checkbox-label">
                                <input type="checkbox" id="bg-default" checked> Default
                            </label>
                        </div>
                    </div>
                </section>

                <section class="tool-section">
                    <h3>Canvas</h3>
                    <div class="canvas-controls">
                        <div class="size-input">
                            <label>W:</label>
                            <input type="number" id="canvas-width" value="40" min="1" max="500">
                        </div>
                        <div class="size-input">
                            <label>H:</label>
                            <input type="number" id="canvas-height" value="20" min="1" max="200">
                        </div>
                        <button id="btn-resize">Resize</button>
                        <button id="btn-clear">Clear</button>
                    </div>
                </section>

                <section class="tool-section">
                    <h3>File</h3>
                    <div class="file-buttons">
                        <button id="btn-save">Save (.txt)</button>
                        <button id="btn-save-plain">Save Plain</button>
                        <button id="btn-load">Load</button>
                        <button id="btn-import-png">Import PNG</button>
                    </div>
                    <input type="file" id="file-input" accept=".txt" style="display:none">
                    <input type="file" id="png-input" accept="image/*" style="display:none">
                </section>

                <section class="tool-section" id="box-style-section" style="display:none">
                    <h3>Line Style</h3>
                    <div class="box-style-buttons">
                        <button class="box-style-btn active" data-style="1">┌─┐ Light</button>
                        <button class="box-style-btn" data-style="2">┏━┓ Heavy</button>
                        <button class="box-style-btn" data-style="3">╔═╗ Double</button>
                    </div>
                </section>

                <section class="tool-section char-palette" id="char-palette-section" style="display:none">
                    <h3>Characters</h3>
                    <div class="char-tabs">
                        <button class="tab-btn active" data-tab="diagonal">Diagonal</button>
                        <button class="tab-btn" data-tab="triangle">Triangle</button>
                    </div>
                    <div id="char-palette" class="char-grid"></div>
                </section>
            </aside>

            <div class="editor-area">
                <div class="canvas-container">
                    <div id="canvas" class="canvas"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- PNG Import Dialog -->
    <dialog id="png-dialog">
        <h3>Import PNG</h3>
        <form id="png-form">
            <div class="form-row">
                <label>Width (chars):</label>
                <input type="number" id="png-width" value="80" min="1" max="500">
            </div>
            <div class="form-row">
                <label>Threshold:</label>
                <input type="range" id="png-threshold" value="250" min="0" max="255">
                <span id="png-threshold-value">250</span>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-invert"> Invert
                </label>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-color"> Use Colors
                </label>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-bitmap"> Bitmap Matching
                </label>
            </div>
            <div class="form-row">
                <label>
                    <input type="checkbox" id="png-extended"> Extended Chars (diagonals/triangles)
                </label>
            </div>
            <div class="dialog-buttons">
                <button type="button" id="png-cancel">Cancel</button>
                <button type="submit">Import</button>
            </div>
        </form>
    </dialog>

    <script src="js/api.js"></script>
    <script src="js/glyphCache.js"></script>
    <script src="js/boxdraw.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/toolbar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
